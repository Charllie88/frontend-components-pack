<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reusable Hero Section Component</title>
  <link rel="stylesheet" href="hero.css" />
</head>
<body>
  <section class="hero" aria-labelledby="hero-heading" aria-describedby="hero-text">
    <div class="hero-content">
      <h1 id="hero-heading">Build Beautiful Experiences</h1>
      <p id="hero-text">A clean and responsive hero section ready to be composed into your layout. Designed with semantic HTML and easy customization.</p>
      <div class="hero-actions">
        <a class="btn btn-primary" href="#get-started">Get Started</a>
        <a class="btn btn-secondary" href="#learn-more">Learn More</a>
      </div>
    </div>
    <div class="hero-image" aria-hidden="true"></div>
  </section>
</body>
</html>
